name: Bug report
description: Report reproducible broken behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproduction you can.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: run_mode
    attributes:
      label: Run mode
      options:
        - Packaged desktop app
        - npm run dev
        - npm run dev:web
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15 arm64, Windows 11 x64, Ubuntu 24.04 x64"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Redact secrets, credentials, terminal output, env vars, private prompts, and private repo contents.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, credentials, private prompts, raw terminal output, environment variables, and private repository contents.
          required: true
